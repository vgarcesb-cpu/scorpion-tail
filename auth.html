<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorpion Tail - Autenticando...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a1628;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.logo{font-size:48px}
.titulo{font-size:20px;font-weight:700;color:#C8A951}
.sub{font-size:13px;color:rgba(255,255,255,.5)}
.spinner{width:36px;height:36px;border:3px solid rgba(200,169,81,.2);border-top:3px solid #C8A951;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#E53935;font-size:13px;text-align:center;max-width:320px}
</style>
</head>
<body>
<div class="logo">ST</div>
<div class="titulo">Scorpion Tail AGA</div>
<div class="spinner" id="spinner"></div>
<div class="sub" id="msg">Procesando autenticacion...</div>
<div class="err" id="err"></div>
<script>
(function(){
  var WORKER = 'https://st-oauth.vgarcesb.workers.dev';

  var params = new URLSearchParams(window.location.search);
  var code   = params.get('code');
  var error  = params.get('error');

  function irReturn(){
    var ret = sessionStorage.getItem('st_return')||'https://totis.cl/portal/index.html';
    sessionStorage.removeItem('st_return');
    window.location.href = ret;
  }

  if(error){
    document.getElementById('spinner').style.display='none';
    document.getElementById('msg').textContent='Autenticacion cancelada';
    document.getElementById('err').textContent='Error: '+error;
    setTimeout(irReturn, 2500);
    return;
  }

  if(!code){
    document.getElementById('spinner').style.display='none';
    document.getElementById('msg').textContent='Sin codigo de autorizacion';
    document.getElementById('err').textContent='No se recibio codigo. Intente nuevamente.';
    return;
  }

  var verifier = sessionStorage.getItem('st_cv');
  if(!verifier){
    document.getElementById('spinner').style.display='none';
    document.getElementById('msg').textContent='Sesion expirada';
    document.getElementById('err').textContent='Intente conectar nuevamente.';
    return;
  }

  document.getElementById('msg').textContent='Conectando con Google Drive...';

  fetch(WORKER, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({code: code, code_verifier: verifier})
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data.error){
      document.getElementById('spinner').style.display='none';
      document.getElementById('msg').textContent='Error de autenticacion';
      document.getElementById('err').textContent=data.error_description||data.error;
      return;
    }
    var expiry = Date.now() + (parseInt(data.expires_in||3600) - 60) * 1000;
    localStorage.setItem('st_gtoken',  data.access_token);
    localStorage.setItem('st_gexpiry', String(expiry));
    if(data.refresh_token) localStorage.setItem('st_grefresh', data.refresh_token);
    sessionStorage.removeItem('st_cv');

    document.getElementById('spinner').style.display='none';
    document.querySelector('.logo').textContent='OK';
    document.querySelector('.titulo').style.color='#43A047';
    document.querySelector('.titulo').textContent='Drive conectado';
    document.getElementById('msg').textContent='Volviendo a Scorpion Tail...';
    setTimeout(irReturn, 1500);
  })
  .catch(function(e){
    document.getElementById('spinner').style.display='none';
    document.getElementById('msg').textContent='Error de red';
    document.getElementById('err').textContent=e.message;
  });
})();
</script>
</body>
</html>
