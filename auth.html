<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorpion Tail — Autenticando...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a1628;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.logo{font-size:48px}
.titulo{font-size:20px;font-weight:700;color:#C8A951}
.sub{font-size:13px;color:rgba(255,255,255,.5)}
.spinner{width:36px;height:36px;border:3px solid rgba(200,169,81,.2);border-top:3px solid #C8A951;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#E53935;font-size:13px;text-align:center;max-width:320px}
</style>
</head>
<body>
<div class="logo">🦂</div>
<div class="titulo">Scorpion Tail · AGA</div>
<div class="spinner" id="spinner"></div>
<div class="sub" id="msg">Procesando autenticación...</div>
<div class="err" id="err"></div>
<script>
(function(){
  // Leer token del hash de la URL (flujo implícito)
  var hash = window.location.hash.substring(1);
  var params = new URLSearchParams(hash);
  var token      = params.get('access_token');
  var expiresIn  = parseInt(params.get('expires_in')||'3600');
  var error      = params.get('error');

  // También revisar query string (por si viene error ahí)
  var query = new URLSearchParams(window.location.search);
  if(!error) error = query.get('error');

  if(error){
    document.getElementById('spinner').style.display='none';
    document.getElementById('msg').textContent='Autenticación cancelada';
    document.getElementById('err').textContent='Error: '+error;
    setTimeout(function(){
      var ret = sessionStorage.getItem('st_return')||'/scorpion-tail/portal/index.html';
      sessionStorage.removeItem('st_return');
      window.location.href = ret;
    }, 2500);
    return;
  }

  if(!token){
    document.getElementById('spinner').style.display='none';
    document.getElementById('msg').textContent='Sin token de acceso';
    document.getElementById('err').textContent='No se recibió token. Intente nuevamente.';
    return;
  }

  // Guardar token
  var expiry = Date.now() + (expiresIn - 60) * 1000;
  localStorage.setItem('st_gtoken',  token);
  localStorage.setItem('st_gexpiry', String(expiry));

  // Éxito
  document.getElementById('spinner').style.display='none';
  document.getElementById('msg').textContent='';
  document.querySelector('.logo').textContent='✅';
  document.querySelector('.sub').textContent='Google Drive conectado — volviendo...';
  document.querySelector('.titulo').style.color='#43A047';

  var ret = sessionStorage.getItem('st_return')||'/scorpion-tail/portal/index.html';
  sessionStorage.removeItem('st_return');
  setTimeout(function(){ window.location.href = ret; }, 1500);
})();
</script>
</body>
</html>
